<!DOCTYPE html>
<html lang="zh-CN" data-theme="nocturne">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>趣味测试 · Nocturne</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=Noto+Serif+SC:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../../assets/theme.css">
<link rel="stylesheet" href="../../assets/base.css">
<link rel="stylesheet" href="quiz.css">
</head>
<body>

<div data-include="../../assets/partials/header.html" data-base="../../"></div>

<main class="page">

  <header class="section-head">
    <p class="section-eyebrow">Divination in Notes</p>
    <h1 class="section-title">趣味测试</h1>
    <div class="hero-divider small"><span>♪</span></div>
    <p class="quiz-tagline">做几道题，帮你匹配合适的角色。</p>
  </header>

  <section class="quiz-banks">
    <article class="quiz-bank glass">
      <div class="quiz-bank-note">♪</div>
      <h2 class="quiz-bank-title">角色偏好</h2>
      <p class="quiz-bank-desc">根据你的选择，从卡库里推荐最合适的角色。</p>
      <button class="btn-primary" disabled>题库准备中</button>
    </article>

    <article class="quiz-bank glass">
      <div class="quiz-bank-note">♫</div>
      <h2 class="quiz-bank-title">用户画像</h2>
      <p class="quiz-bank-desc">回答一些问题，得到一份属于你的画像描述。</p>
      <button class="btn-primary" disabled>题库准备中</button>
    </article>
  </section>

  <p class="quiz-footnote">
    这个模块不需要 API，全部在本地计算。题库文件放在 <code>data/quiz-banks/</code>，之后会陆续添加。
  </p>

</main>

<div data-include="../../assets/partials/footer.html" data-base="../../"></div>

<script src="../../assets/include.js"></script>
<script type="module" src="quiz.js"></script>

</body>
</html>
