<!DOCTYPE html>
<html lang="zh-CN" data-theme="nocturne">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>人设生产 · Nocturne</title>
  <link rel="stylesheet" href="../../assets/base.css">
  <link rel="stylesheet" href="../../assets/theme.css">
  <link rel="stylesheet" href="./persona.css">
</head>
<body>
  <div data-include="../../assets/partials/header.html" data-base="../../"></div>

  <main class="page persona-page">
    <div class="persona-bg-ornament" aria-hidden="true"></div>

    <section class="persona-hero">
      <p class="persona-eyebrow">♪ Persona Studio</p>
      <h1 class="persona-title">人设生产</h1>
      <p class="persona-subtitle">选一种入口，AI 会写三份候选人设给你挑</p>
    </section>

    <section class="persona-entry-grid">
      <a class="glass persona-entry-card" href="./create.html?mode=scratch">
        <div class="persona-entry-index">01</div>
        <h2 class="persona-entry-title">从零开始</h2>
        <p class="persona-entry-desc">选择世界观模板、文风、篇幅，从空白页里长出一个人设</p>
        <div class="persona-entry-cta">开始 <span aria-hidden="true">→</span></div>
      </a>

      <a class="glass persona-entry-card" href="./create.html?mode=based">
        <div class="persona-entry-index">02</div>
        <h2 class="persona-entry-title">根据已有 char 设定</h2>
        <p class="persona-entry-desc">上传目标角色卡与世界书，生成一个能和 ta 玩到一起的用户人设</p>
        <div class="persona-entry-cta">开始 <span aria-hidden="true">→</span></div>
      </a>
    </section>
  </main>

  <div data-include="../../assets/partials/footer.html" data-base="../../"></div>
